<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>TWO PIECE - Pelinäkymä</title>
    <link rel="stylesheet" href="game-style.css">
</head>
<body>

<div id="game-grid">
    <section class="panel map-panel">
        <h2>MAAILMANKARTTA / KOHDE</h2>
        <div class="placeholder-content">
            <p>Tähän tulee kartta tai kohteen kuva</p>
            <div class="stat-row">SIJAINTI: Tokio (NRT)</div>
        </div>
    </section>

    <section class="panel stats-panel">
        <h2>PELAAJAN STATUS</h2>
        <div class="stat-box">
            <p>POLTTOAINE: 5000 L</p>
            <p>PISTEET: 1250</p>
        </div>
        <h3>SAATAVILLA OLEVAT LENNOT</h3>
        <div class="flight-buttons">
            <button class="menu-btn">LENNÄ: SEOUL</button>
            <button class="menu-btn">LENNÄ: BERLIINI</button>
        </div>
    </section>

    <section class="panel inventory-panel">
        <h2>KERÄTTY KOKOELMA</h2>
        <div class="anime-inventory-grid">
            <div class="inventory-item">
                <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/nx21-6nS59Wf9eInL.jpg" alt="One Piece">
                <span>One Piece</span>
            </div>
            <div class="slot">Tyhjä</div>
            <div class="slot">Tyhjä</div>
            <div class="slot">Tyhjä</div>
        </div>
    </section>

    <section class="panel actions-panel">
        <h2>TOIMINNOT</h2>
        <div class="action-grid">
            <button class="menu-btn special">SKILL TREE</button>
            <button class="menu-btn special">GAMBLING</button>
            <button class="menu-btn danger">LOPETA PELI</button>
        </div>
    </section>
</div>

</body>
</html>
