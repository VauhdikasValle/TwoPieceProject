<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>TWO PIECE - Pelinäkymä</title>
    <link rel="stylesheet" href="game-style.css">
</head>
<body>

<div id="game-container">
    <section class="panel map-panel">
        <h2>MAAILMANKARTTA</h2>
        <div class="map-placeholder">
            <p>SIJAINTI: Tokio (NRT)</p>
        </div>
    </section>

    <aside id="sidebar">

        <section class="panel status-section">
            <h2>PELAAJAN STATUS</h2>
            <div class="stat-row">POLTTOAINE: <span>5000 L</span></div>
            <div class="stat-row">PISTEET: <span>1250</span></div>
            <div class="flight-list">
                <button class="menu-btn">LENNÄ: SEOUL</button>
                <button class="menu-btn">LENNÄ: BERLIINI</button>
            </div>
        </section>

        <section class="panel inventory-section">
            <h2>KERÄTTY KOKOELMA</h2>
            <div class="anime-grid">
                <div class="item-slot"><img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/nx21-6nS59Wf9eInL.jpg" alt="OP"></div>
                <div class="item-slot"></div>
                <div class="item-slot"></div>
                <div class="item-slot"></div>
                <div class="item-slot"></div>
                <div class="item-slot"></div>
            </div>
        </section>

        <section class="panel actions-section">
            <h2>TOIMINNOT</h2>
            <button class="menu-btn special">SKILL TREE</button>
            <button class="menu-btn special">GAMBLING</button>
            <button class="menu-btn danger">LOPETA PELI</button>
        </section>

    </aside>
</div>

</body>
</html>
